name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create Firebase Service Account file
        run: echo '${{ secrets.GCP_SA_KEY }}' > ./backend/firebase-service-account.json

      - name: Deploy to Cloud Run
        run: |
          cd backend
          gcloud run deploy nutrisense-backend \
            --source . \
            --region asia-south1 \
            --allow-unauthenticated \
            --set-env-vars="GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},MAPS_API_KEY=${{ secrets.MAPS_API_KEY }},FIREBASE_SERVICE_ACCOUNT_PATH=./firebase-service-account.json" \
            --project lunar-linker-494309-c8
