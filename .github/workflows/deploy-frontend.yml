name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'firebase.json'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '23'

      - name: Install Dependencies
        run: npm install
        working-directory: ./frontend

      - name: Build Frontend
        run: npm run build
        working-directory: ./frontend
        env:
          REACT_APP_API_URL: https://nutrisense-backend-800533609738.asia-south1.run.app/api
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: lunar-linker-494309-c8.firebaseapp.com
          REACT_APP_FIREBASE_PROJECT_ID: lunar-linker-494309-c8
          REACT_APP_FIREBASE_STORAGE_BUCKET: lunar-linker-494309-c8.firebasestorage.app
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: 800533609738
          REACT_APP_FIREBASE_APP_ID: 1:800533609738:web:0f6aa3758cb3e06c610ef3
          REACT_APP_MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.GCP_SA_KEY }}'
          projectId: lunar-linker-494309-c8
          channelId: live
